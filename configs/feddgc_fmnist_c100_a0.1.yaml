experiment_name: feddgc_fmnist_c100_a0.1
method: feddgc
dataset: fmnist
num_clients: 100
alpha: 0.1
num_rounds: 200
seed: 42
fraction_fit: 0.5
fraction_evaluate: 0.0
local_epochs: 5
batch_size: 32
lr: 0.01
momentum: 0.9
feddgc:
  cache_growth_rate_v: 50.0
  cache_lambda: 0.5
  staleness_decay_a: 0.5
  mixing_alpha: 0.5
  proximal_mu: 0.01
  max_staleness: 10
  deadline_percentile: 0.6
straggler:
  straggler_fraction: 0.3
  slow_factor: 5.0
